<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="Year-Round Fundraiser — Shop and Support Early Childhood Education">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffc857"/>
      <stop offset="55%" stop-color="#ffb13d"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <linearGradient id="bagg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff2df"/>
    </linearGradient>
    <clipPath id="clip"><rect x="0" y="0" width="900" height="260" rx="26"/></clipPath>
  </defs>

  <rect x="0" y="0" width="900" height="260" rx="26" fill="url(#bg)"/>

  <g clip-path="url(#clip)" opacity="0.16" stroke="#ffffff" stroke-width="3" fill="none">
    <polygon points="60,10 90,26 90,58 60,74 30,58 30,26"/>
    <polygon points="130,50 160,66 160,98 130,114 100,98 100,66"/>
    <polygon points="40,110 70,126 70,158 40,174 10,158 10,126"/>
    <polygon points="820,20 850,36 850,68 820,84 790,68 790,36"/>
    <polygon points="760,90 790,106 790,138 760,154 730,138 730,106"/>
    <polygon points="850,140 880,156 880,188 850,204 820,188 820,156"/>
    <polygon points="700,190 730,206 730,238 700,254 670,238 670,206"/>
  </g>

  <!-- Bee -->
  <g transform="translate(122,152) rotate(-6)">
    <!-- stinger -->
    <path d="M -32 0 L -44 -5 L -44 5 Z" fill="#3a2b22"/>
    <!-- wings -->
    <ellipse cx="-16" cy="-28" rx="22" ry="13" fill="#ffffff" opacity="0.85" transform="rotate(-24 -16 -28)"/>
    <ellipse cx="16" cy="-28" rx="22" ry="13" fill="#ffffff" opacity="0.85" transform="rotate(24 16 -28)"/>
    <!-- body -->
    <ellipse cx="0" cy="2" rx="32" ry="22" fill="#ffce4a"/>
    <path d="M -20 -18 A 28 22 0 0 0 -20 22" fill="none" stroke="#3a2b22" stroke-width="7" stroke-linecap="round"/>
    <path d="M -2 -22 A 28 22 0 0 0 -2 26" fill="none" stroke="#3a2b22" stroke-width="7" stroke-linecap="round"/>
    <path d="M 16 -20 A 26 20 0 0 0 16 24" fill="none" stroke="#3a2b22" stroke-width="7" stroke-linecap="round"/>
    <!-- head -->
    <circle cx="34" cy="0" r="11" fill="#3a2b22"/>
    <circle cx="37" cy="-3" r="2.4" fill="#ffffff"/>
    <!-- antennae -->
    <path d="M 30 -9 C 32 -20 26 -24 20 -26" stroke="#3a2b22" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 38 -9 C 44 -18 44 -24 40 -30" stroke="#3a2b22" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="-26" r="2.6" fill="#3a2b22"/>
    <circle cx="40" cy="-30" r="2.6" fill="#3a2b22"/>
  </g>

  <!-- Shopping bag -->
  <g transform="translate(770,168)">
    <path d="M -34 -20 L -40 40 A 8 8 0 0 0 -32 50 L 32 50 A 8 8 0 0 0 40 40 L 34 -20 Z" fill="url(#bagg)" stroke="#c9793f" stroke-width="3"/>
    <path d="M -18 -20 C -18 -42 18 -42 18 -20" fill="none" stroke="#c9793f" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="20" font-size="26" text-anchor="middle" font-family="Verdana, Arial, sans-serif">💛</text>
  </g>

  <text x="240" y="108" font-family="Verdana, Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff">Year-Round Fundraiser</text>
  <text x="240" y="146" font-family="Verdana, Arial, sans-serif" font-size="19" font-weight="bold" fill="#5a3a1a">Shop &amp; help our hive grow, all year long 🐝</text>
  <text x="240" y="178" font-family="Verdana, Arial, sans-serif" font-size="17" fill="#5a3a1a">10% of every profit goes back into early childhood education programs</text>
</svg>
